<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MLB Hub">
  <meta name="theme-color" content="#071527">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>MLB Live Hub | All 30 Teams</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--primary:#0C2340;--secondary:#CE1141;--accent:#EAAA00;--dark:#071527;--light:#f4f6f9;--white:#fff;--card-bg:#112d52;--border:rgba(234,170,0,0.25);--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden}
    a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;outline:none;font-family:inherit}
    ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:4px}

    /* LIVE TICKER */
    #ticker{background:var(--secondary);padding:6px 0;overflow:hidden;position:relative;border-bottom:2px solid var(--accent)}
    .ticker-label{position:absolute;left:0;top:0;bottom:0;background:var(--dark);color:var(--accent);font-weight:800;font-size:.72rem;letter-spacing:1.5px;padding:0 14px;display:flex;align-items:center;z-index:2;text-transform:uppercase;gap:6px}
    .ticker-label .live-dot{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .ticker-track{display:flex;animation:scroll 30s linear infinite;padding-left:140px}
    .ticker-track:hover{animation-play-state:paused}
    @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-game{white-space:nowrap;padding:0 24px;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:8px;border-right:1px solid rgba(255,255,255,.2)}
    .ticker-game .score{background:rgba(0,0,0,.3);padding:2px 8px;border-radius:4px;font-family:'Courier New',monospace;font-weight:700}
    .ticker-game .status{color:var(--accent);font-size:.72rem;font-weight:800}
    .ticker-game .live-badge{background:#00ff88;color:#000;font-size:.65rem;font-weight:900;padding:1px 6px;border-radius:3px;animation:pulse 1.5s infinite}

    /* NAVBAR */
    #navbar{background:var(--primary);border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:999;display:flex;align-items:center;padding:0 24px;height:60px;gap:8px}
    .nav-logo{display:flex;align-items:center;gap:10px;margin-right:20px;font-size:1rem;font-weight:900;letter-spacing:.5px}
    .nav-logo span{color:var(--secondary)}
    .nav-links{display:flex;gap:4px;flex:1;flex-wrap:nowrap;overflow-x:auto}
    .nav-btn{background:none;color:var(--white);font-size:.82rem;font-weight:700;padding:8px 14px;border-radius:6px;display:flex;align-items:center;gap:5px;transition:.2s;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
    .nav-btn:hover,.nav-btn.active{background:var(--secondary)}
    .nav-btn i{color:var(--accent);font-size:.75rem}
    .nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
    .team-select{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--white);border-radius:8px;padding:6px 10px;font-size:.8rem;font-weight:700;font-family:inherit;cursor:pointer}
    .team-select option{background:var(--dark);color:white}
    .team-select optgroup{background:var(--dark);color:var(--accent);font-weight:800}
    .refresh-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--white);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:.2s}
    .refresh-btn:hover{background:var(--secondary);border-color:var(--secondary)}
    .refresh-btn.spinning i{animation:spin .8s linear}
    @keyframes spin{to{transform:rotate(360deg)}}
    .last-update{font-size:.65rem;color:rgba(255,255,255,.5);white-space:nowrap}

    /* SECTIONS */
    .section{display:none;padding:24px;max-width:1400px;margin:0 auto}
    .section.active{display:block}
    .section-title{font-size:1.4rem;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:1px}
    .section-title i{color:var(--accent)}

    /* HOME SECTION */
    .home-hero{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:24px;border:1px solid var(--border)}
    .home-hero-bg{background:linear-gradient(135deg,var(--primary) 0%,var(--card-bg) 50%,var(--primary) 100%);padding:36px;position:relative}
    .home-hero .bg-text{position:absolute;right:-10px;bottom:-30px;font-size:12rem;font-weight:900;opacity:.03;line-height:1;pointer-events:none}
    .home-hero .team-emoji{font-size:3.5rem;margin-bottom:8px}
    .home-hero .team-name{font-size:2.4rem;font-weight:900;line-height:1.1}
    .home-hero .team-slogan{font-size:.9rem;color:var(--accent);font-weight:700;font-style:italic;margin-top:4px}
    .home-hero .team-record-big{font-size:1.3rem;color:var(--white);font-weight:700;margin-top:8px}
    .home-hero .team-record-big .pct{color:rgba(255,255,255,.5);font-size:.9rem}
    .home-hero .streak-pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:800;margin-top:6px}
    .home-hero .streak-pill.win{background:rgba(0,255,136,.15);color:#00ff88}
    .home-hero .streak-pill.loss{background:rgba(206,17,65,.15);color:var(--secondary)}
    .quick-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
    .quick-pill{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:10px;flex:1;min-width:180px}
    .quick-pill i{font-size:1.2rem;color:var(--accent);width:24px;text-align:center}
    .quick-pill .pill-text{font-size:.78rem;color:rgba(255,255,255,.5)}
    .quick-pill .pill-val{font-size:.92rem;font-weight:700}
    .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
    .info-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .info-card .info-header{background:rgba(0,0,0,.3);padding:10px 16px;font-size:.82rem;font-weight:800;text-transform:uppercase;color:var(--accent);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
    .info-card .info-body{padding:14px 16px}
    .info-card .info-body p{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:8px}
    .info-card .info-body p:last-child{margin-bottom:0}
    .fun-fact{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .fun-fact:last-child{border-bottom:none}
    .fun-fact i{color:var(--accent);margin-top:2px;min-width:14px}
    .fun-fact span{font-size:.8rem;color:rgba(255,255,255,.65);line-height:1.4}
    .quick-access{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
    .qa-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px}
    .qa-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .qa-card i{font-size:1.3rem;color:var(--accent)}
    .qa-card .qa-text{font-size:.85rem;font-weight:700}
    .qa-card .qa-sub{font-size:.68rem;color:rgba(255,255,255,.4)}

    /* SCOREBOARD */
    .scoreboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:24px}
    .game-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.2s}
    .game-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
    .game-card.live{border-color:#00ff88;box-shadow:0 0 16px rgba(0,255,136,.15)}
    .game-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(0,0,0,.2);font-size:.72rem;font-weight:700;color:rgba(255,255,255,.6)}
    .game-header .game-status{color:var(--accent);font-weight:800;text-transform:uppercase}
    .game-header .game-status.live{color:#00ff88}
    .game-header .game-status.final{color:var(--secondary)}
    .game-teams{padding:10px 14px}
    .team-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:.92rem}
    .team-row .team-info{display:flex;align-items:center;gap:8px;font-weight:700;flex:1}
    .team-row .record{font-size:.7rem;color:rgba(255,255,255,.4);font-weight:600}
    .team-row .runs{font-size:1.1rem;font-weight:900;min-width:28px;text-align:center;padding:2px 6px;border-radius:4px}
    .team-row.winner .runs{background:var(--accent);color:var(--dark)}
    .game-linescore{padding:6px 14px 10px;font-size:.68rem;color:rgba(255,255,255,.5);border-top:1px solid rgba(255,255,255,.05)}
    .linescore-table{width:100%;border-collapse:collapse;font-family:'Courier New',monospace;font-size:.7rem}
    .linescore-table th,.linescore-table td{padding:2px 5px;text-align:center;min-width:18px}
    .linescore-table th{color:var(--accent);font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
    .linescore-table .total{font-weight:900;color:var(--white);font-size:.78rem}

    /* STANDINGS */
    .standings-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
    .division-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .division-header{background:rgba(0,0,0,.3);padding:10px 16px;font-size:.85rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
    .standings-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .standings-table th{padding:8px 12px;text-align:left;font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.08)}
    .standings-table th:not(:first-child){text-align:center}
    .standings-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
    .standings-table td:not(:first-child){text-align:center;font-family:'Courier New',monospace;font-size:.8rem}
    .standings-table tr:hover{background:rgba(255,255,255,.03)}
    .standings-table .team-name{font-weight:700;cursor:pointer;transition:.2s}
    .standings-table .team-name:hover{color:var(--accent)}
    .standings-table .rank{color:var(--accent);font-weight:800;width:24px}
    .standings-table .gb{color:var(--secondary);font-weight:700}
    .standings-table .streak-w{color:#00ff88}.standings-table .streak-l{color:var(--secondary)}
    .standings-table tr.first-place .team-name{color:var(--accent)}
    .league-tabs{display:flex;gap:8px;margin-bottom:16px}
    .league-tab{padding:8px 20px;border-radius:8px;font-weight:700;font-size:.85rem;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--white);transition:.2s}
    .league-tab.active,.league-tab:hover{background:var(--secondary);border-color:var(--secondary)}

    /* SCHEDULE */
    .schedule-filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .filter-btn{padding:6px 16px;border-radius:20px;font-size:.78rem;font-weight:700;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--white);transition:.2s}
    .filter-btn.active,.filter-btn:hover{background:var(--secondary);border-color:var(--secondary)}
    .schedule-grid{display:grid;gap:10px}
    .sched-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:12px 16px;gap:16px;transition:.2s}
    .sched-card:hover{border-color:var(--accent)}
    .sched-card.next-game{border-color:var(--accent);box-shadow:0 0 12px rgba(234,170,0,.15)}
    .sched-date{min-width:60px;text-align:center}
    .sched-date .month{font-size:.65rem;text-transform:uppercase;color:var(--accent);font-weight:800;letter-spacing:1px}
    .sched-date .day{font-size:1.5rem;font-weight:900;line-height:1}
    .sched-date .dow{font-size:.65rem;color:rgba(255,255,255,.4);font-weight:600}
    .sched-divider{width:2px;height:40px;background:var(--border);border-radius:1px}
    .sched-matchup{flex:1}
    .sched-matchup .teams{font-size:.92rem;font-weight:700}
    .sched-matchup .detail{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px}
    .sched-broadcasts{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
    .sched-tv,.sched-radio{font-size:.68rem;color:var(--accent);background:rgba(234,170,0,.1);padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:4px;font-weight:600}
    .sched-radio{color:rgba(255,255,255,.5);background:rgba(255,255,255,.06)}
    .sched-promos{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
    .sched-promo{font-size:.66rem;color:#f0a0d0;background:rgba(240,160,208,.1);padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:4px;font-weight:600}
    .sched-result{text-align:right;min-width:80px}
    .sched-result .result-badge{padding:4px 12px;border-radius:6px;font-size:.78rem;font-weight:800;display:inline-block}
    .sched-result .result-badge.win{background:rgba(0,255,136,.15);color:#00ff88}
    .sched-result .result-badge.loss{background:rgba(206,17,65,.15);color:var(--secondary)}
    .sched-result .result-badge.upcoming{background:rgba(234,170,0,.1);color:var(--accent)}
    .sched-result .countdown{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:2px}
    .next-badge{background:var(--accent);color:var(--dark);font-size:.6rem;font-weight:900;padding:2px 8px;border-radius:3px;margin-left:8px}

    /* TEAM PAGE */
    .team-hero{background:linear-gradient(135deg,var(--primary),var(--card-bg));border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
    .team-hero .bg-text{position:absolute;right:-20px;bottom:-20px;font-size:8rem;font-weight:900;opacity:.04;line-height:1;pointer-events:none}
    .team-hero .team-name{font-size:2rem;font-weight:900}
    .team-hero .team-record{font-size:1.1rem;color:var(--accent);font-weight:700;margin-top:4px}
    .team-hero .team-meta{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
    .team-hero .meta-item{font-size:.78rem;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px}
    .team-hero .meta-item i{color:var(--accent)}
    .team-roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:16px}
    .player-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;transition:.2s;cursor:pointer}
    .player-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .player-card .player-header{display:flex;justify-content:space-between;align-items:flex-start}
    .player-card .player-name{font-size:.85rem;font-weight:700}
    .player-card .player-num{font-size:.75rem;color:var(--accent);font-weight:800}
    .player-card .player-pos{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:2px}
    .player-card .player-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
    .player-card .stat{text-align:center;padding:4px;background:rgba(0,0,0,.2);border-radius:4px}
    .player-card .stat .val{font-size:.82rem;font-weight:800;color:var(--accent);font-family:'Courier New',monospace}
    .player-card .stat .lbl{font-size:.58rem;color:rgba(255,255,255,.35);text-transform:uppercase}

    /* PLAYER MODAL */
    #playerModal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:none;justify-content:center;align-items:center;padding:20px}
    #playerModal.open{display:flex}
    .modal-content{background:var(--primary);border:1px solid var(--border);border-radius:var(--radius);max-width:600px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.6);position:relative}
    .modal-header{background:linear-gradient(135deg,var(--card-bg),var(--primary));padding:20px;border-bottom:2px solid var(--accent)}
    .modal-header .close-btn{position:absolute;top:12px;right:12px;background:none;color:rgba(255,255,255,.5);font-size:1.2rem;padding:4px 8px;border-radius:4px;transition:.2s;cursor:pointer;z-index:10}
    .modal-header .close-btn:hover{color:var(--white);background:var(--secondary)}
    .modal-body{padding:20px}
    .modal-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:12px}
    .modal-stat{text-align:center;padding:8px;background:rgba(0,0,0,.2);border-radius:8px}
    .modal-stat .val{font-size:1.1rem;font-weight:900;color:var(--accent);font-family:'Courier New',monospace}
    .modal-stat .lbl{font-size:.65rem;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:2px}
    .modal-section{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
    .modal-section-title{font-size:.78rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .modal-bio{font-size:.82rem;color:rgba(255,255,255,.65);line-height:1.5}
    .modal-game-log{margin-top:8px}
    .modal-game-log table{width:100%;border-collapse:collapse;font-size:.75rem}
    .modal-game-log th{text-align:left;padding:4px 8px;color:var(--gold);font-size:.65rem;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.08)}
    .modal-game-log td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-family:'Courier New',monospace}
    .modal-game-log tr:hover{background:rgba(255,255,255,.03)}

    /* LEADERS */
    .leaders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:16px}
    .leader-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .leader-card .leader-title{background:rgba(0,0,0,.3);padding:10px 14px;font-size:.8rem;font-weight:800;text-transform:uppercase;color:var(--accent);letter-spacing:.5px}
    .leader-card .leader-list{padding:8px 0}
    .leader-item{display:flex;align-items:center;padding:6px 14px;gap:10px;font-size:.82rem;transition:.15s}
    .leader-item:hover{background:rgba(255,255,255,.03)}
    .leader-item .rank{font-weight:900;color:var(--accent);min-width:18px}
    .leader-item .rank.gold{color:#FFD700}.leader-item .rank.silver{color:#C0C0C0}.leader-item .rank.bronze{color:#CD7F32}
    .leader-item .name{flex:1;font-weight:600}
    .leader-item .value{font-family:'Courier New',monospace;font-weight:800;color:var(--white)}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:rgba(255,255,255,.4);font-size:.85rem}
    .loading .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .empty-state{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:.9rem}

    /* FOOTER */
    footer{text-align:center;padding:32px 24px;color:rgba(255,255,255,.15);font-size:.72rem;border-top:1px solid rgba(255,255,255,.05);margin-top:40px}

    @media(max-width:768px){
      .scoreboard{grid-template-columns:1fr}
      .standings-container{grid-template-columns:1fr}
      .nav-links .btn-label{display:none}
      #navbar{padding:0 12px}
      .section{padding:16px}
      .team-hero .team-name{font-size:1.4rem}
      .home-hero .team-name{font-size:1.5rem}
      .info-grid{grid-template-columns:1fr}
      .quick-stats{flex-direction:column}
    }
  </style>
</head>
<body>

<!-- LIVE TICKER -->
<div id="ticker">
  <div class="ticker-label"><span class="live-dot"></span> LIVE MLB</div>
  <div class="ticker-track" id="tickerTrack"><span class="loading"><span class="spinner"></span>Loading scores...</span></div>
</div>

<!-- NAVBAR -->
<div id="navbar">
  <div class="nav-logo"><i class="fas fa-baseball" style="color:var(--accent)"></i> MLB <span>LIVE</span> HUB</div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showSection('home',this)"><i class="fas fa-home"></i> <span class="btn-label">Home</span></button>
    <button class="nav-btn" onclick="showSection('scoreboard',this)"><i class="fas fa-tv"></i> <span class="btn-label">Scoreboard</span></button>
    <button class="nav-btn" onclick="showSection('standings',this)"><i class="fas fa-list-ol"></i> <span class="btn-label">Standings</span></button>

// ── INIT ──
async function init(){
  await loadTeams();
  buildTeamSelector();
  const saved=localStorage.getItem('mlbhub_team');
  if(saved)currentTeam=parseInt(saved);
  document.getElementById('teamSelector').value=currentTeam;
  refreshAll();
  refreshTimer=setInterval(()=>{fetchScoreboard();fetchTicker()},30000);
  setInterval(updateCountdowns,1000);
}

async function loadTeams(){
  try{
    const r=await fetch(API+'/teams?sportId=1&season=2026');
    const d=await r.json();
    d.teams.forEach(t=>{TEAMS_MAP[t.id]={id:t.id,name:t.name,abbr:t.abbreviation,short:t.teamName,div:t.division?.id,league:t.league?.id,venue:t.venue?.name}});
  }catch(e){console.error('Teams load error',e)}
}

function buildTeamSelector(){
  const sel=document.getElementById('teamSelector');
  const divTeams={};
  Object.values(TEAMS_MAP).forEach(t=>{
    const dName=DIVISIONS[t.div]||'Other';
    if(!divTeams[dName])divTeams[dName]=[];
    divTeams[dName].push(t);
  });
  const order=['AL East','AL Central','AL West','NL East','NL Central','NL West'];
  sel.innerHTML=order.map(d=>{
    if(!divTeams[d])return'';
    const opts=divTeams[d].sort((a,b)=>a.name.localeCompare(b.name)).map(t=>`<option value="${t.id}">${t.abbr} - ${t.short}</option>`).join('');
    return`<optgroup label="${d}">${opts}</optgroup>`;
  }).join('');
  sel.value=currentTeam;
}

function switchTeam(id){
  currentTeam=parseInt(id);
  localStorage.setItem('mlbhub_team',currentTeam);
  // Update colors from team info
  const info=TEAM_INFO[currentTeam];
  if(info){
    const r=document.documentElement.style;
    r.setProperty('--secondary',info.colors[0]);
    r.setProperty('--primary',info.colors[1]||info.colors[0]);
    r.setProperty('--accent',info.colors[2]||'#EAAA00');
  }
  const sec=document.querySelector('.section.active')?.id;
  if(sec==='section-home')buildHomePage();
  if(sec==='section-team')loadTeamPage();
  if(sec==='section-schedule')loadSchedule();
  if(sec==='section-leaders')loadLeaders();
}

async function refreshAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  // Apply team colors
  const info=TEAM_INFO[currentTeam];
  if(info){
    const r=document.documentElement.style;
    r.setProperty('--secondary',info.colors[0]);
    r.setProperty('--primary',info.colors[1]||info.colors[0]);
    r.setProperty('--accent',info.colors[2]||'#EAAA00');
  }
  await Promise.all([fetchTicker(),fetchScoreboard(),fetchStandings(),buildHomePage(),loadSchedule(),loadLeaders()]);
  btn.classList.remove('spinning');
  document.getElementById('lastUpdate').textContent='Updated '+new Date().toLocaleTimeString();
}

// ── SECTIONS ──
function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(id==='home')buildHomePage();
  if(id==='team')loadTeamPage();
  if(id==='schedule')loadSchedule();
  if(id==='leaders')loadLeaders();
}

// ── HOME PAGE ──
async function buildHomePage(){
  const el=document.getElementById('homeContent');
  const tm=TEAMS_MAP[currentTeam];
  const info=TEAM_INFO[currentTeam];
  if(!tm){el.innerHTML='<div class="empty-state">Select a team</div>';return}
  
  // Fetch record
  let w=0,l=0,pct='.000',streak='--',rs=0,ra=0;
  try{
    const r=await fetch(API+`/schedule?teamId=${currentTeam}&season=2026&sportId=1&gameType=R&hydrate=linescore&startDate=2026-03-20&endDate=${currentDate}`);
    const d=await r.json();
    const games=d.dates?.flatMap(dt=>dt.games)||[];
    const finished=games.filter(g=>g.status.abstractGameState==='Final').sort((a,b)=>new Date(a.gameDate)-new Date(b.gameDate));
    let lastRes='',cnt=0;
    finished.forEach(g=>{
      const isHome=g.teams.home.team.id===currentTeam;
      const won=isHome?g.teams.home.isWinner:g.teams.away.isWinner;
      const ourR=isHome?(g.linescore?.teams?.home?.runs||0):(g.linescore?.teams?.away?.runs||0);
      const theirR=isHome?(g.linescore?.teams?.away?.runs||0):(g.linescore?.teams?.home?.runs||0);
      rs+=ourR;ra+=theirR;
      if(won)w++;else l++;
    });

async function fetchTicker(){
  try{
    const r=await fetch(API+`/schedule?date=${new Date().toISOString().slice(0,10)}&sportId=1&hydrate=linescore`);
    const d=await r.json();
    const games=d.dates?.[0]?.games||[];
    if(!games.length){document.getElementById('tickerTrack').innerHTML='<span style="padding:0 20px;opacity:.5">No games today</span>';return}
    const items=games.map(g=>{
      const away=g.teams.away,home=g.teams.home;
      const aName=TEAMS_MAP[away.team.id]?.abbr||away.team.name.slice(0,3).toUpperCase();
      const hName=TEAMS_MAP[home.team.id]?.abbr||home.team.name.slice(0,3).toUpperCase();
      const ls=g.linescore||{};
      const st=g.status.abstractGameState;
      const aR=ls.teams?.away?.runs??'-';
      const hR=ls.teams?.home?.runs??'-';
      let statusHtml='';
      if(st==='Live'||st==='In Progress')statusHtml=`<span class="live-badge">LIVE</span>`;

      }
      return`<div class="ticker-game">${aName} <span class="score">${aR}</span> @ <span class="score">${hR}</span> ${hName} ${statusHtml}</div>`;
    }).join('');
    document.getElementById('tickerTrack').innerHTML=items+items;
  }catch(e){console.error('Ticker error',e)}
}

function renderGameCard(g){
  const away=g.teams.away,home=g.teams.home;
  const aName=TEAMS_MAP[away.team.id]?.abbr||'???';
  const hName=TEAMS_MAP[home.team.id]?.abbr||'???';
  const aFull=TEAMS_MAP[away.team.id]?.short||away.team.name;
  const hFull=TEAMS_MAP[home.team.id]?.short||home.team.name;
  const ls=g.linescore||{};
  const st=g.status.abstractGameState;
  const det=g.status.detailedState;
  const aR=ls.teams?.away?.runs;
  const hR=ls.teams?.home?.runs;
  const aH=ls.teams?.away?.hits??'';
  const hH=ls.teams?.home?.hits??'';
  const aE=ls.teams?.away?.errors??'';
  const hE=ls.teams?.home?.errors??'';
  const isLive=st==='Live'||st==='In Progress';
  const isFinal=st==='Final';
  const awayWin=isFinal&&aR>hR;
  const homeWin=isFinal&&hR>aR;
  let statusText='',statusClass='';
  if(isLive){const inn=ls.currentInning||'?';const half=ls.inningHalf==='Top'?'Top':'Bot';statusText=`${half} ${inn}`;statusClass='live'}
  else if(isFinal){statusText=det||'Final';statusClass='final'}
  else{const gt=new Date(g.gameDate);statusText=gt.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}
  let linescoreHtml='';
  if(ls.innings&&ls.innings.length>0){
    const headers=ls.innings.map((_,i)=>`<th>${i+1}</th>`).join('');
    const awayInns=ls.innings.map(inn=>`<td>${inn.away?.runs??''}</td>`).join('');
    const homeInns=ls.innings.map(inn=>`<td>${inn.home?.runs??''}</td>`).join('');
    linescoreHtml=`<div class="game-linescore"><table class="linescore-table"><tr><th></th>${headers}<th>R</th><th>H</th><th>E</th></tr><tr><td style="font-weight:700">${aName}</td>${awayInns}<td class="total">${aR??''}</td><td>${aH}</td><td>${aE}</td></tr><tr><td style="font-weight:700">${hName}</td>${homeInns}<td class="total">${hR??''}</td><td>${hH}</td><td>${hE}</td></tr></table></div>`;
  }
  const venue=g.venue?.name||'';
  return`<div class="game-card${isLive?' live':''}"><div class="game-header"><span>${venue}</span><span class="game-status ${statusClass}">${isLive?'<i class="fas fa-circle" style="font-size:.5rem;color:#00ff88;margin-right:4px"></i>':''}${statusText}</span></div><div class="game-teams"><div class="team-row${awayWin?' winner':''}"><span class="team-info">${aFull}<span class="record">(${away.leagueRecord.wins}-${away.leagueRecord.losses})</span></span><span class="runs">${aR??'-'}</span></div><div class="team-row${homeWin?' winner':''}"><span class="team-info">${hFull}<span class="record">(${home.leagueRecord.wins}-${home.leagueRecord.losses})</span></span><span class="runs">${hR??'-'}</span></div></div>${linescoreHtml}</div>`;
}

function changeDate(offset){
  if(offset===0)currentDate=new Date().toISOString().slice(0,10);

  if(offset===0)document.querySelectorAll('#dateNav .filter-btn')[1].classList.add('active');

async function loadTeamPage(){
  const el=document.getElementById('teamContent');
  const tm=TEAMS_MAP[currentTeam];
  const info=TEAM_INFO[currentTeam];
  if(!tm){el.innerHTML='<div class="empty-state">Select a team</div>';return}

    const [rosterRes,schedRes]=await Promise.all([
      fetch(API+`/teams/${currentTeam}/roster?rosterType=active&season=2026`),
      fetch(API+`/schedule?teamId=${currentTeam}&season=2026&sportId=1&gameType=R&hydrate=linescore&startDate=2026-03-20&endDate=${currentDate}`)
    ]);
    const rosterData=await rosterRes.json();
    const schedData=await schedRes.json();
    const games=schedData.dates?.flatMap(d=>d.games)||[];
    const record=calcRecord(games);
    const roster=rosterData.roster||[];
    const posOrder={'C':1,'1B':2,'2B':3,'3B':4,'SS':5,'LF':6,'CF':7,'RF':8,'DH':9,'OF':10,'IF':11,'P':20,'SP':21,'RP':22};
    roster.sort((a,b)=>(posOrder[a.position.abbreviation]||15)-(posOrder[b.position.abbreviation]||15));

    let html=`<div class="team-hero"><div class="bg-text">${info?.bg||tm.abbr}</div><div style="font-size:2.5rem;margin-bottom:4px">${info?.emoji||'⚾'}</div><div class="team-name">${tm.name}</div><div class="team-record">${record.w}-${record.l} (${record.pct})</div><div class="team-meta"><div class="meta-item"><i class="fas fa-map-marker-alt"></i> ${info?.park||tm.venue||''}</div><div class="meta-item"><i class="fas fa-baseball"></i> ${DIVISIONS[tm.div]||''}</div><div class="meta-item"><i class="fas fa-fire"></i> Streak: ${record.streak}</div><div class="meta-item"><i class="fas fa-trophy"></i> WS Titles: ${info?.titles?.length||0}</div><div class="meta-item"><i class="fas fa-calendar"></i> Est. ${info?.est||'—'}</div></div></div>`;

    html+=`<div class="team-roster" id="rosterGrid">${roster.map(p=>{
      const isPitcher=p.position.type==='Pitcher';
      return`<div class="player-card" data-type="${isPitcher?'pitch':'pos'}" onclick="loadPlayer(${p.person.id})"><div class="player-header"><div><div class="player-name">${p.person.fullName}</div><div class="player-pos">${p.position.name}</div></div><div class="player-num">#${p.jerseyNumber||'--'}</div></div></div>`;
    }).join('')}</div>`;
    el.innerHTML=html;
    loadRosterStats(roster);
  }catch(e){el.innerHTML='<div class="empty-state">Error loading team</div>';console.error(e)}
}

function calcRecord(games){
  let w=0,l=0,streak='',streakCount=0,lastResult='';
  const sorted=games.filter(g=>g.status.abstractGameState==='Final').sort((a,b)=>new Date(a.gameDate)-new Date(b.gameDate));
  sorted.forEach(g=>{const isHome=g.teams.home.team.id===currentTeam;const won=isHome?g.teams.home.isWinner:g.teams.away.isWinner;if(won)w++;else l++});
  for(let i=sorted.length-1;i>=0;i--){const g=sorted[i];const isHome=g.teams.home.team.id===currentTeam;const won=isHome?g.teams.home.isWinner:g.teams.away.isWinner;const res=won?'W':'L';if(!lastResult)lastResult=res;if(res===lastResult)streakCount++;else break}
  streak=lastResult+streakCount;const pct=w+l>0?(w/(w+l)).toFixed(3):'.000';return{w,l,pct,streak};
}

async function loadRosterStats(roster){
  const ids=roster.map(p=>p.person.id);
  for(let i=0;i<ids.length;i+=5){
    const batch=ids.slice(i,i+5);
    await Promise.all(batch.map(async id=>{
      try{
        const r=await fetch(API+`/people/${id}?hydrate=stats(group=[hitting,pitching],type=[season],season=2026)`);
        const d=await r.json();
        const p=d.people?.[0];if(!p)return;
        const card=document.querySelector(`.player-card[onclick="loadPlayer(${id})"]`);if(!card)return;
        const hitting=p.stats?.find(s=>s.group?.displayName==='hitting')?.splits?.[0]?.stat;
        const pitching=p.stats?.find(s=>s.group?.displayName==='pitching')?.splits?.[0]?.stat;
        let statsHtml='';
        if(hitting&&hitting.gamesPlayed>0){statsHtml=`<div class="player-stats"><div class="stat"><div class="val">${hitting.avg||'-'}</div><div class="lbl">AVG</div></div><div class="stat"><div class="val">${hitting.homeRuns||0}</div><div class="lbl">HR</div></div><div class="stat"><div class="val">${hitting.rbi||0}</div><div class="lbl">RBI</div></div></div>`}
        else if(pitching&&(pitching.gamesPlayed>0||pitching.inningsPitched)){statsHtml=`<div class="player-stats"><div class="stat"><div class="val">${pitching.era||'-'}</div><div class="lbl">ERA</div></div><div class="stat"><div class="val">${pitching.wins||0}-${pitching.losses||0}</div><div class="lbl">W-L</div></div><div class="stat"><div class="val">${pitching.strikeOuts||0}</div><div class="lbl">K</div></div></div>`}
        if(statsHtml){const existing=card.querySelector('.player-stats');if(existing)existing.outerHTML=statsHtml;else card.insertAdjacentHTML('beforeend',statsHtml)}
      }catch(e){}
    }));
  }
}

      statsHtml=`<div class="modal-stats">${stats.map(s=>`<div class="modal-stat"><div class="val">${s.v??'-'}</div><div class="lbl">${s.l}</div></div>`).join('')}</div>`;

async function loadSchedule(){
  const grid=document.getElementById('scheduleGrid');
  const tm=TEAMS_MAP[currentTeam];
  document.getElementById('schedTeamName').textContent=tm?.short||'Team';
  grid.innerHTML='<div class="loading"><span class="spinner"></span>Loading schedule...</div>';
  try{
    const r=await fetch(API+`/schedule?teamId=${currentTeam}&season=2026&sportId=1&gameType=R&hydrate=linescore,broadcasts,promotions&startDate=2026-03-20&endDate=2026-10-01`);
    const d=await r.json();
    allScheduleGames=d.dates?.flatMap(dt=>dt.games)||[];
    renderSchedule();
  }catch(e){grid.innerHTML='<div class="empty-state">Error loading schedule</div>';console.error(e)}
}

function renderSchedule(){
  const grid=document.getElementById('scheduleGrid');
  const now=new Date();
  let games=allScheduleGames;let nextFound=false;
  if(currentFilter==='upcoming')games=games.filter(g=>new Date(g.gameDate)>=new Date(now.toDateString()));
  else if(currentFilter==='completed')games=games.filter(g=>g.status.abstractGameState==='Final');
  else if(currentFilter==='home')games=games.filter(g=>g.teams.home.team.id===currentTeam);
  else if(currentFilter==='away')games=games.filter(g=>g.teams.away.team.id===currentTeam);
  if(!games.length){grid.innerHTML='<div class="empty-state">No games found</div>';return}
  grid.innerHTML=games.slice(0,80).map(g=>{
    const dt=new Date(g.gameDate);const isHome=g.teams.home.team.id===currentTeam;
    const opp=isHome?g.teams.away:g.teams.home;const us=isHome?g.teams.home:g.teams.away;
    const oppName=TEAMS_MAP[opp.team.id]?.short||opp.team.name;const oppAbbr=TEAMS_MAP[opp.team.id]?.abbr||'???';
    const st=g.status.abstractGameState;const isFinal=st==='Final';const ls=g.linescore||{};
    const ourR=isHome?ls.teams?.home?.runs:ls.teams?.away?.runs;const theirR=isHome?ls.teams?.away?.runs:ls.teams?.home?.runs;
    const won=isFinal&&us.isWinner;let resultHtml='',isNext=false;
    if(isFinal){resultHtml=`<div class="sched-result"><span class="result-badge ${won?'win':'loss'}">${won?'W':'L'} ${ourR}-${theirR}</span></div>`}
    else{if(!nextFound&&dt>=now){nextFound=true;isNext=true}resultHtml=`<div class="sched-result"><span class="result-badge upcoming">${dt.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span><div class="countdown" data-time="${g.gameDate}"></div></div>`}
    const tvCasts=(g.broadcasts||[]).filter(b=>b.type==='TV'&&b.language==='en').map(b=>b.name);
    const radioCasts=(g.broadcasts||[]).filter(b=>(b.type==='AM'||b.type==='FM')&&b.language==='en').map(b=>b.name);
    const promos=(g.promotions||[]).map(p=>p.name||p.description||'').filter(Boolean);
    let broadcastHtml='';
    if(tvCasts.length)broadcastHtml+=`<span class="sched-tv"><i class="fas fa-tv"></i> ${tvCasts.join(', ')}</span>`;
    if(radioCasts.length)broadcastHtml+=`<span class="sched-radio"><i class="fas fa-radio"></i> ${radioCasts.join(', ')}</span>`;
    let promoHtml='';
    if(promos.length)promoHtml=`<div class="sched-promos">${promos.map(p=>`<span class="sched-promo"><i class="fas fa-gift"></i> ${p}</span>`).join('')}</div>`;
    return`<div class="sched-card${isNext?' next-game':''}"><div class="sched-date"><div class="month">${dt.toLocaleDateString('en-US',{month:'short'})}</div><div class="day">${dt.getDate()}</div><div class="dow">${dt.toLocaleDateString('en-US',{weekday:'short'})}</div></div><div class="sched-divider"></div><div class="sched-matchup"><div class="teams">${isHome?'vs':'@'} ${oppName} (${oppAbbr})${isNext?'<span class="next-badge">NEXT GAME</span>':''}</div><div class="detail">${isHome?'Home':'Away'} · ${g.venue?.name||''}</div>${broadcastHtml?`<div class="sched-broadcasts">${broadcastHtml}</div>`:''}${promoHtml}</div>${resultHtml}</div>`;
  }).join('');
}

function filterSched(type,btn){
  currentFilter=type;
  document.querySelectorAll('#schedFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedule();
}

function updateCountdowns(){
  document.querySelectorAll('.countdown[data-time]').forEach(el=>{
    const t=new Date(el.dataset.time)-new Date();
    if(t<=0){el.textContent='Game Time!';return}
    const d=Math.floor(t/86400000),h=Math.floor(t%86400000/3600000),m=Math.floor(t%3600000/60000),s=Math.floor(t%60000/1000);
    el.textContent=d>0?`${d}d ${h}h ${m}m`:h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`;
  });
}
